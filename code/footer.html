<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontdale - Footer Template</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display+SC&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="footer.css">
</head>
<body>
    
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-col">
                <h4 class="footer-heading">LINKS</h4>
                <a href="#" class="footer-link">Privacy Policy</a>
                <a href="#" class="footer-link">Terms of Service</a>
                <a href="#" class="footer-link">Press</a>
            </div>

            <div class="footer-col">
                <h4 class="footer-heading">COMPANY</h4>
                <a href="#" class="footer-link">Careers</a>
                <a href="#" class="footer-link">Contact</a>
                <a href="#" class="footer-link">Partnerships</a>
            </div>

            <div class="footer-col">
                <h4 class="footer-heading">CONNECT WITH US</h4>
                <div class="social-container">
                    <a class="social-icon instagram" href="https://instagram.com" target="_blank">
                        <img src="/assets/instagram.png" alt="Instagram">
                    </a>
                    <a class="social-icon tiktok" href="https://tiktok.com" target="_blank">
                        <img src="/assets/tiktok.png" alt="TikTok">
                    </a>
                    <a class="social-icon facebook" href="https://facebook.com" target="_blank">
                        <img src="/assets/facebook.png" alt="Facebook">
                    </a>
                    <a class="social-icon x" href="https://x.com" target="_blank">
                        <img src="/assets/X.png" alt="X">
                    </a>
                </div>
            </div>

            <div class="footer-col">
                <h4 class="footer-heading">DOWNLOAD OUR APP</h4>
                <div class="app-buttons">
                    <a href="#" class="app-btn app-store">
                        <img src="/assets/appstore.png" alt="Download on App Store">
                    </a>
                    <a href="#" class="app-btn google-play">
                        <img src="/assets/googleplay.png" alt="Get it on Google Play">
                    </a>
                </div>
            </div>
        </div>
        
        <div class="footer-copyright">
            © 2026 FONTDALE | ALL RIGHTS RESERVED
        </div>
    </footer>

</body>
</html>
